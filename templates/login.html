<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Manager — Sign In</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
{% if turnstile_enabled and turnstile_site_key %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
{% endif %}
<script>
// Apply the last signed-in user's saved theme (wm-theme in localStorage)
// BEFORE first paint so the login chrome matches their light/dark preference.
// Any non-dark theme falls back to the 'light' palette; dark/neobrutal-dark/
// cyberpunk keep the default dark palette baked into :root.
(function(){
    try {
        const saved = localStorage.getItem('wm-theme');
        const DARK = ['dark', 'neobrutal-dark', 'cyberpunk'];
        if (saved && !DARK.includes(saved)) {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
})();
</script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    /* Dark palette — default, used when the last signed-in user had a dark theme */
    --bg-primary: #0f1114;
    --bg-panel: #181b20;
    --bg-input: #14171b;
    --border: #2a2e36;
    --border-focus: #4a8eff;
    --text-primary: #e8eaed;
    --text-secondary: #a0a6b1;
    --text-muted: #7a8190;
    --accent: #4a8eff;
    --accent-hover: #6ba1ff;
    --danger: #ef4444;
    --radius: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
}
html[data-theme="light"] {
    --bg-primary: #f6f7fb;
    --bg-panel: #ffffff;
    --bg-input: #f3f4f8;
    --border: #dfe2ea;
    --border-focus: #4a8eff;
    --text-primary: #1a1d24;
    --text-secondary: #4c5260;
    --text-muted: #7a8190;
    --accent: #2b6fe6;
    --accent-hover: #1f5bc9;
    --danger: #dc2626;
}
html, body { height: 100%; }
body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
}

/* Split layout — hero on the left, form on the right */
.login-split {
    position: relative;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* Hero (left pane) — animated sine-wave canvas + optional custom logo footer */
.login-hero {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 32px;
    overflow: hidden;
    color: #fff;
    background: #0a1420; /* fallback while canvas draws first frame */
}
.login-hero-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 0;
}
.login-hero-inner {
    position: relative;
    z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    text-align: center;
    color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,0.35);
}
.login-hero-logo {
    width: 100px; max-width: 40vw; height: auto;
    display: block;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
}
.login-hero-title {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 1.65rem; font-weight: 600;
    letter-spacing: -1px;
    color: #fff;
}
.login-hero-footer {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    padding: 0 24px;
    z-index: 2;
}
.login-hero-footer img {
    width: var(--branding-width, 180px);
    max-width: 80%;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
}

/* Form (right pane) */
.login-form-pane {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 32px;
    background: var(--bg-panel);
}
.login-form {
    width: 100%;
    max-width: 340px;
    display: flex; flex-direction: column; gap: 18px;
    animation: fadeUp 0.45s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}
.login-subtitle {
    font-size: 0.86rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
}
.form-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    transition: border 0.18s ease, box-shadow 0.18s ease;
}
.form-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(74,142,255,0.15);
}
.form-input::placeholder { color: var(--text-muted); }
.password-wrapper { position: relative; }
.password-toggle {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 4px; display: flex; align-items: center;
}
.password-toggle:hover { color: var(--text-secondary); }
.btn-login {
    padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-family: var(--font); font-size: 0.95rem;
    font-weight: 600; cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
}
.btn-login:hover { background: var(--accent-hover); }
.btn-login:disabled { opacity: 0.5; cursor: default; }
.error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--danger);
    padding: 0.6rem 0.85rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    display: flex; align-items: center; gap: 0.4rem;
}
.login-form-footer {
    position: absolute;
    bottom: 22px; left: 0; right: 0;
    display: flex; justify-content: center;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0;
}

@media (max-width: 820px) {
    .login-split { grid-template-columns: 1fr; }
    .login-hero { min-height: 260px; padding: 40px 24px 96px; }
    .login-hero-footer { bottom: 14px; }
    .login-form-pane { padding: 40px 24px 72px; }
}
</style>
</head>
<body>
<div class="login-split">
    <aside class="login-hero" aria-hidden="true">
        <canvas class="login-hero-canvas" id="heroCanvas"></canvas>
        <div class="login-hero-inner">
            <img class="login-hero-logo" src="/static/logo.svg" alt="Warehouse Manager">
            <div class="login-hero-title">Warehouse Manager</div>
        </div>
        {% if branding_logo_url %}
        <div class="login-hero-footer" style="--branding-width: {{ branding_logo_width }}px;">
            <img src="{{ branding_logo_url }}" alt="Branding logo">
        </div>
        {% endif %}
    </aside>

    <section class="login-form-pane">
        <form class="login-form" id="loginForm" method="POST" action="/login" autocomplete="on">
            <div>
                <div class="login-subtitle">Sign in to your account</div>
            </div>

            <div id="errorBox" style="display:none;" class="error-msg">
                <span>✕</span>
                <span id="errorText"></span>
            </div>

            {% if error %}
            <div class="error-msg">
                <span>✕</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username"
                       placeholder="name@example.com"
                       autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1" aria-label="Show/hide password">
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            {% if turnstile_enabled and turnstile_site_key %}
            <div class="form-group" style="display:flex;justify-content:center;">
                <div class="cf-turnstile" id="cfTurnstile"
                     data-sitekey="{{ turnstile_site_key }}"
                     data-theme="dark"
                     data-callback="onTurnstileSuccess"
                     data-expired-callback="onTurnstileExpired"
                     data-error-callback="onTurnstileError"></div>
            </div>
            {% endif %}

            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>

        <div class="login-form-footer">Ver. {{ app_version }}</div>
    </section>
</div>

<script>
const TURNSTILE_ENABLED = {{ 'true' if turnstile_enabled and turnstile_site_key else 'false' }};
let turnstileToken = '';
function onTurnstileSuccess(t){ turnstileToken = t; }
function onTurnstileExpired(){ turnstileToken = ''; }
function onTurnstileError(){ turnstileToken = ''; }

function togglePassword(){
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('errorBox');
    const errText = document.getElementById('errorText');

    if (TURNSTILE_ENABLED && !turnstileToken) {
        errText.textContent = 'Please complete the challenge';
        errBox.style.display = 'flex';
        return;
    }
    btn.disabled = true; btn.textContent = 'Signing in…';
    errBox.style.display = 'none';
    try {
        const body = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
        };
        if (TURNSTILE_ENABLED) body['cf-turnstile-response'] = turnstileToken;
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = data.redirect || '/';
        } else {
            errText.textContent = data.error || 'Login failed';
            errBox.style.display = 'flex';
            btn.disabled = false; btn.textContent = 'Sign In';
            if (TURNSTILE_ENABLED && window.turnstile) {
                try { window.turnstile.reset('#cfTurnstile'); } catch {}
                turnstileToken = '';
            }
        }
    } catch {
        errText.textContent = 'Connection error';
        errBox.style.display = 'flex';
        btn.disabled = false; btn.textContent = 'Sign In';
    }
});

/* ───────────────────────────────────────────────────────────────
   Animated sine-wave gradient on the hero panel.
   Triadic 3-color palette randomly rotated on each reload.
   ─────────────────────────────────────────────────────────────── */
(function(){
    const canvas = document.getElementById('heroCanvas');
    if (!canvas) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        // Still paint a static gradient for reduced-motion users
        drawStaticGradient(canvas);
        return;
    }

    const hslToRgb = (h, s, l) => {
        h /= 360;
        const a = s * Math.min(l, 1 - l);
        const f = n => {
            const k = (n + h * 12) % 12;
            const v = l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
            return Math.round(v * 255);
        };
        return [f(0), f(8), f(4)];
    };

    // Triadic palette: 3 hues 120° apart, full saturation, mid-lightness,
    // with a random base hue each reload. "Complementary" in the looser
    // sense users typically mean — harmonious, evenly spaced.
    const baseHue = Math.random() * 360;
    const hues = [baseHue, (baseHue + 120) % 360, (baseHue + 240) % 360];
    // Shuffle so the band order also varies per reload
    for (let i = hues.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [hues[i], hues[j]] = [hues[j], hues[i]];
    }
    const rgb = hues.map(h => hslToRgb(h, 0.78, 0.52));
    const n = rgb.length;

    // Random rotation of the gradient band
    const rotRad = Math.random() * Math.PI * 2;
    const cosR = Math.cos(rotRad), sinR = Math.sin(rotRad);

    // Low-res offscreen buffer for speed; CSS scales it to the viewport
    let W = 0, H = 0;
    let img = null, data = null;
    const ctx = canvas.getContext('2d');

    function resize(){
        const rect = canvas.getBoundingClientRect();
        // ~160 px tall internal buffer is plenty; keeps the wave smooth
        const scale = Math.max(0.22, Math.min(0.35, 200 / Math.max(1, rect.height)));
        W = Math.max(1, Math.round(rect.width * scale));
        H = Math.max(1, Math.round(rect.height * scale));
        canvas.width = W; canvas.height = H;
        img = ctx.createImageData(W, H);
        data = img.data;
    }
    resize();
    window.addEventListener('resize', () => {
        clearTimeout(window._heroResizeT);
        window._heroResizeT = setTimeout(resize, 120);
    });

    // Random wave parameters, persistent for this session
    const freq1 = 1.8 + Math.random() * 2.0;
    const freq2 = 3.0 + Math.random() * 3.5;
    const amp1  = 0.22 + Math.random() * 0.14;
    const amp2  = 0.08 + Math.random() * 0.10;
    const phaseSpeed1 =  0.12 + Math.random() * 0.18;
    const phaseSpeed2 = -(0.18 + Math.random() * 0.22);

    const start = performance.now();
    function frame(now){
        const t = (now - start) / 1000;
        const p1 = t * phaseSpeed1;
        const p2 = t * phaseSpeed2;
        for (let y = 0; y < H; y++){
            for (let x = 0; x < W; x++){
                const cx = x - W/2, cy = y - H/2;
                const rx = cx * cosR - cy * sinR;
                const ry = cx * sinR + cy * cosR;
                const maxDim = Math.max(W, H);
                const nx = (rx + maxDim/2) / maxDim;
                // Zoom into the central band so it reads as wide soft ribbons
                const ny = (ry + maxDim/2) / maxDim * 0.55 + 0.225;
                const wave = Math.sin(nx * freq1 + p1) * amp1
                           + Math.sin(nx * freq2 + p2 + 1.3) * amp2;
                let tt = ny + wave;
                if (tt < 0) tt = 0; else if (tt > 1) tt = 1;
                const p = tt * (n - 1);
                const i = Math.floor(p);
                const f = p - i;
                const uu = f * f * (3 - 2 * f);
                const a = rgb[i], b = rgb[Math.min(n - 1, i + 1)];
                const idx = (y * W + x) * 4;
                data[idx]   = a[0] + (b[0] - a[0]) * uu;
                data[idx+1] = a[1] + (b[1] - a[1]) * uu;
                data[idx+2] = a[2] + (b[2] - a[2]) * uu;
                data[idx+3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    function drawStaticGradient(c){
        const rect = c.getBoundingClientRect();
        c.width = Math.round(rect.width);
        c.height = Math.round(rect.height);
        const g = c.getContext('2d').createLinearGradient(0, 0, rect.width, rect.height);
        const baseHue = Math.random() * 360;
        const hues = [baseHue, (baseHue + 120) % 360, (baseHue + 240) % 360];
        const rgb = hues.map(h => hslToRgb(h, 0.78, 0.52));
        g.addColorStop(0, `rgb(${rgb[0].join(',')})`);
        g.addColorStop(0.5, `rgb(${rgb[1].join(',')})`);
        g.addColorStop(1, `rgb(${rgb[2].join(',')})`);
        const ctx2 = c.getContext('2d');
        ctx2.fillStyle = g;
        ctx2.fillRect(0, 0, rect.width, rect.height);
    }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Manager — Sign In</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
{% if turnstile_enabled and turnstile_site_key %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
{% endif %}
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg-primary: #0f1114;
    --bg-secondary: #181b20;
    --bg-card: #1e2128;
    --bg-input: #14171b;
    --border: #2a2e36;
    --border-focus: #4a8eff;
    --text-primary: #e8eaed;
    --text-secondary: #a0a6b1;
    --text-muted: #7a8190;
    --accent: #4a8eff;
    --accent-hover: #6ba1ff;
    --danger: #ef4444;
    --radius: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
}
body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}
.login-wrapper {
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}
.login-header {
    text-align: center;
    margin-bottom: 2rem;
}
.logo {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
}
.logo-img {
    width: 38px; height: 38px; border-radius: 6px;
}
.login-subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
}
.login-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
}
.form-group {
    margin-bottom: 1.25rem;
}
.form-label {
    display: block;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
}
.form-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s ease;
}
.form-input:focus { border-color: var(--border-focus); }
.form-input::placeholder { color: var(--text-muted); }
.btn-login {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
}
.btn-login:hover { background: var(--accent-hover); }
.btn-login:disabled { opacity: 0.5; cursor: default; }
.error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--danger);
    padding: 0.65rem 1rem;
    border-radius: var(--radius);
    font-size: 0.88rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.password-wrapper {
    position: relative;
}
.password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
}
.password-toggle:hover { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-header">
        <div class="logo">
            <img src="/static/logo.svg" alt="WM" class="logo-img">
            Warehouse Manager
        </div>
        <div class="login-subtitle">Sign in to your account</div>
    </div>
    <div class="login-card">
        <form id="loginForm" method="POST" action="/login">
            <div id="errorBox" style="display:none;" class="error-msg">
                <span>✕</span>
                <span id="errorText"></span>
            </div>

            {% if error %}
            <div class="error-msg">
                <span>✕</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username"
                       placeholder="Enter your username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            {% if turnstile_enabled and turnstile_site_key %}
            <div class="form-group" style="display:flex;justify-content:center;">
                <div class="cf-turnstile" id="cfTurnstile"
                     data-sitekey="{{ turnstile_site_key }}"
                     data-theme="dark"
                     data-callback="onTurnstileSuccess"
                     data-expired-callback="onTurnstileExpired"
                     data-error-callback="onTurnstileError"></div>
            </div>
            {% endif %}
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>
    </div>
</div>
<script>
const TURNSTILE_ENABLED = {{ 'true' if turnstile_enabled and turnstile_site_key else 'false' }};
let turnstileToken = '';

function onTurnstileSuccess(token) { turnstileToken = token; }
function onTurnstileExpired() { turnstileToken = ''; }
function onTurnstileError() { turnstileToken = ''; }

function togglePassword() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
}
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('errorBox');
    const errText = document.getElementById('errorText');

    if (TURNSTILE_ENABLED && !turnstileToken) {
        errText.textContent = 'Please complete the challenge';
        errBox.style.display = 'flex';
        return;
    }

    btn.disabled = true; btn.textContent = 'Signing in…';
    errBox.style.display = 'none';
    try {
        const body = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
        };
        if (TURNSTILE_ENABLED) body['cf-turnstile-response'] = turnstileToken;
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = data.redirect || '/';
        } else {
            errText.textContent = data.error || 'Login failed';
            errBox.style.display = 'flex';
            btn.disabled = false; btn.textContent = 'Sign In';
            if (TURNSTILE_ENABLED && window.turnstile) {
                try { window.turnstile.reset('#cfTurnstile'); } catch {}
                turnstileToken = '';
            }
        }
    } catch {
        errText.textContent = 'Connection error';
        errBox.style.display = 'flex';
        btn.disabled = false; btn.textContent = 'Sign In';
    }
});
</script>
</body>
</html>
